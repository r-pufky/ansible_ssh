---
###############################################################################
# SSH Role Options
###############################################################################

ssh___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-13',
    _release='trixie',
  ) }}"

ssh___app: '{{ {} | r_pufky.data.v3(

    _rsa_key_minimum_size=1024,
  ) }}'

###############################################################################
# APT Packages
###############################################################################

ssh___packages:
  - 'ssh'  # ssh, sshd.

# KerberosGetAFSToken (ssh_cfg_server_kerberos_get_afs_token) requires these
# packages installed or SSHD will fail to start in addition to a custom SSHD
# binary (not provided in debian packaging).
ssh___kerberos_minimum_packages:
  - 'krb5-user'
  - 'openafs-krb5'
  - 'libpam-krb5'
