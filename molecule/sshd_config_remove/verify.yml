---
- name: 'Verify'
  hosts: 'all'
  gather_facts: false
  tasks:
    - name: 'Verify | test | /etc/ssh/sshd_config'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: 'Verify | test | /etc/ssh/sshd_config'
        test_src: 'files/sshd_config'
        test_file: '/etc/ssh/sshd_config'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0644'
        test_diff: true

    # Values are internal values NOT ssh_config values; check exit code only.
    - name: 'Verify | cmd | query SSH configuration'
      ansible.builtin.command: 'sshd -T'  # requires /run/sshd to exist.
      changed_when: false
      failed_when: false
      register: ssh__test_sshd_t_test

    - name: 'Verify | assert | SSH configuration no static errors'
      ansible.builtin.assert:
        quiet: true
        that:
          - ssh__test_sshd_t_test.rc == 0
        fail_msg: >
          ✘ 'sshd -T' returned static errors:
          {{ ssh__test_sshd_t_test.stderr }}.

    - name: 'Verify | test | /etc/ssh/'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'file.yml'
      vars:
        test_name: 'Verify | test | /etc/ssh/{{ item }}'
        test_file: '/etc/ssh/{{ item }}'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0644'
        test_state: 'absent'
        test_diff: true
      loop:
        - 'ssh_cfg_server_banner'
        - 'ssh_cfg_server_host_certificate'
        - 'ssh_cfg_server_host_key'
        - 'ssh_cfg_server_trusted_user_ca_keys'
