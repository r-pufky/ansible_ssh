---
###############################################################################
# SSHD Config Remove
###############################################################################
# Confirm setting string data then reverted removes generated files; see
# sshd_config.yml for current list of managed files.
#
# This should revert back to an exact copy of the default sshd_config test.
#
# Tests:
# * sshd_config all options correct.
# * No static errors.
# * /etc/ssh/ssh_cfg_server_banner removed.
# * /etc/ssh/ssh_cfg_server_host_certificate removed.
# * /etc/ssh/ssh_cfg_server_host_key removed.
# * /etc/ssh/ssh_cfg_server_trusted_user_ca_keys removed.

dependency:
  name: 'galaxy'
driver:
  name: 'podman'
provisioner:
  name: 'ansible'
  config_options:
    defaults:
      interpreter_python: 'auto_silent'
      callback_whitelist: 'profile_tasks, timer, yaml'
    ssh_connection:
      pipelining: false
platforms:
  - name: 'ssh-sshd-config-remove'
    image: 'ghcr.io/hifis-net/debian-systemd:13'
    systemd: 'always'
    volumes:
      - '/sys/fs/cgroup:/sys/fs/cgroup:ro'
    command: '/lib/systemd/systemd'
    pre_build_image: true
verifier:
  name: 'ansible'
scenario:
  test_sequence:
    - 'destroy'
    - 'syntax'
    - 'create'
    - 'prepare'
    - 'converge'
    - 'verify'
    - 'destroy'
