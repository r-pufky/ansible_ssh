---
- name: 'Prepare'
  hosts: 'all'
  gather_facts: false
  tasks:
    # For verifying SSHD (sshd -T).
    - name: 'Prepare | filesystem | create /run/sshd'
      ansible.builtin.file:
        path: '/run/sshd'
        owner: 'root'
        group: 'root'
        mode: '0755'
        state: 'directory'
