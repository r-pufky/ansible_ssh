---
- name: 'Verify'
  hosts: 'all'
  gather_facts: false
  tasks:
    - name: 'Verify | test | /etc/ssh/'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'copy.yml'
      vars:
        test_name: '{{ "Verify | test | /etc/ssh/" ~ item }}'
        test_src: 'files/{{ item }}'
        test_file: '{{ "/etc/ssh/" ~ item }}'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0644'
        test_diff: true
      loop:
        - 'ssh_config'
        - 'sshd_config'

    # Values are internal values NOT ssh_config values; check exit code only.
    - name: 'Verify | cmd | query SSH configuration'
      ansible.builtin.command: 'ssh -G test'
      changed_when: false
      failed_when: false
      register: ssh__test_ssh_g_test

    - name: 'Verify | assert | ssh_config no static errors'
      ansible.builtin.assert:
        quiet: true
        that:
          - ssh__test_ssh_g_test.rc == 0
        fail_msg: >-
          ✘ 'ssh -G test' returned static errors:
          {{ ssh__test_ssh_g_test.stderr }}.

    # values are internal values NOT ssh_config values; check exit code only.
    - name: 'Verify | cmd | query SSHD configuration'
      ansible.builtin.command: 'sshd -T'  # requires /run/sshd to exist.
      changed_when: false
      failed_when: false
      register: ssh__test_sshd_t_test

    - name: 'Verify | assert | sshd_config no static errors'
      ansible.builtin.assert:
        quiet: true
        that:
          - ssh__test_sshd_t_test.rc == 0
        fail_msg: >-
          ✘ 'sshd -T' returned static errors:
          {{ ssh__test_sshd_t_test.stderr }}.

    - name: 'Verify | test | /etc/ssh/ssh_host_dsa_key'
      ansible.builtin.include_role:
        name: 'r_pufky.data.test'
        tasks_from: 'file.yml'
      vars:
        test_name: 'Verify | test | /etc/ssh/ssh_host_dsa_key'
        test_file: '/etc/ssh/ssh_host_dsa_key'
        test_owner: 'root'
        test_group: 'root'
        test_mode: '0644'
        test_state: 'absent'
        test_diff: true

    - name: 'Verify | query | /etc/ssh/ssh_host_rsa_key'
      ansible.builtin.command:
        argv:
          - 'ssh-keygen'
          - '-lf'
          - '/etc/ssh/ssh_host_rsa_key'
      register: ssh__test_rsa_host_key_strength
      changed_when: false
      failed_when: false

    - name: 'Verify | assert | correct RSA key strength'
      ansible.builtin.assert:
        quiet: true
        that:
          - ssh__test_rsa_host_key_strength.stdout.split(' ')[0] | int == 4096
        fail_msg: >-
          ✘ /etc/ssh/ssh_host_rsa_key key strength should be
          {{ ssh__test_rsa_host_key_strength.stdout.split(" ")[0] }}
          (expected: 4096).
